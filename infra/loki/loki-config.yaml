auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Keep logs for 30 days to match pm2-logrotate retention.
  retention_period: 720h
  # Boardgamers is low-volume; allow generous ingestion limits.
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  max_query_series: 10000

compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem
